apply plugin: 'com.android.application'

android {
    namespace "com.gaoqianleme.app"
    compileSdk rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "com.gaoqianleme.app"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    signingConfigs {
        release {
            storeFile file('release.keystore')
            if (project.hasProperty('KEYSTORE_PASSWORD')) {
                storePassword project.property('KEYSTORE_PASSWORD')
            }
            if (project.hasProperty('KEY_ALIAS')) {
                keyAlias project.property('KEY_ALIAS')
            }
            if (project.hasProperty('KEYSTORE_PASSWORD')) {
                keyPassword project.property('KEYSTORE_PASSWORD')
            }
        }
    }
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.release
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
    
    // 穿山甲GroMore SDK (手动下载的aar文件)
    implementation(name:'open_ad_sdk',ext:'aar')
    implementation(name:'open_ad_tk_sdk',ext:'aar')
    implementation(name:'open_ad_gdt_sdk',ext:'aar')
    implementation(name:'open_ad_baidu_sdk',ext:'aar')
    implementation(name:'open_ad_kuaishou_sdk',ext:'aar')
    implementation(name:'open_ad_ks_sdk',ext:'aar')
    implementation(name:'open_ad_mintegral_sdk',ext:'aar')
    implementation(name:'open_ad_sigmob_sdk',ext:'aar')
    implementation(name:'open_ad_bigo_sdk',ext:'aar')
    implementation(name:'open_ad_gromore_sdk',ext:'aar')
    implementation(name:'open_ad_unity_sdk',ext:'aar')
    implementation(name:'open_ad_applovin_sdk',ext:'aar')
    implementation(name:'open_ad_mopub_sdk',ext:'aar')
    implementation(name:'open_ad_chartboost_sdk',ext:'aar')
    implementation(name:'open_ad_topon_sdk',ext:'aar')
    implementation(name:'open_ad_nend_sdk',ext:'aar')
    
    // 穿山甲SDK依赖
    implementation 'com.google.android.gms:play-services-ads-identifier:18.0.1'
    implementation 'com.google.android.gms:play-services-appset:16.0.2'
    implementation 'androidx.legacy:legacy-support-v4:1.0.0'
    implementation 'com.google.android.material:material:1.11.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
    implementation 'androidx.recyclerview:recyclerview:1.2.1'
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}