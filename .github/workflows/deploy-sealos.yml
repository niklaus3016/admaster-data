name: Deploy to Sealos

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Login to Sealos Registry
      uses: docker/login-action@v3
      with:
        registry: sealos.hub:5000
        username: ${{ secrets.SEALOS_USERNAME }}
        password: ${{ secrets.SEALOS_PASSWORD }}
      
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: sealos.hub:5000/${{ secrets.SEALOS_NAMESPACE }}/admaster-frontend:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
      
    - name: Deploy to Sealos
      env:
        SEALOS_KUBECONFIG: ${{ secrets.SEALOS_KUBECONFIG }}
      run: |
        # 安装 sealos CLI
        curl -sfL https://raw.githubusercontent.com/labring/sealos/main/scripts/install.sh | sh -s v4.3.0
        
        # 配置 kubeconfig
        echo "$SEALOS_KUBECONFIG" | base64 -d > ~/.kube/config
        
        # 更新镜像
        kubectl set image deployment/admaster-frontend admaster-frontend=sealos.hub:5000/${{ secrets.SEALOS_NAMESPACE }}/admaster-frontend:${{ github.sha }}
        
        # 等待部署完成
        kubectl rollout status deployment/admaster-frontend
