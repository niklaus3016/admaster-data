name: Build Android APK

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-debug:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Build Vue3 project
      run: npm run build
      
    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'
        cache: 'gradle'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Grant execute permission for gradlew
      run: chmod +x android/gradlew
      
    - name: Sync to Android platform
      run: npx cap sync android
      
    - name: Build Debug APK
      run: |
        cd android
        ./gradlew assembleDebug
        
    - name: Calculate Debug APK SHA1
      run: |
        echo "========================================"
        echo "Debug APK SHA1 Checksum:"
        echo "========================================"
        sha1sum android/app/build/outputs/apk/debug/app-debug.apk
        echo ""
        echo "Debug APK MD5 Checksum:"
        md5sum android/app/build/outputs/apk/debug/app-debug.apk
        echo "========================================"
        
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: android/app/build/outputs/apk/debug/app-debug.apk

  build-release:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Build Vue3 project
      run: npm run build
      
    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'
        cache: 'gradle'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Grant execute permission for gradlew
      run: chmod +x android/gradlew
      
    - name: Sync to Android platform
      run: npx cap sync android
      
    - name: Build Release APK
      run: |
        cd android
        ./gradlew assembleRelease
        
    - name: Calculate Release APK SHA1
      run: |
        echo "========================================"
        echo "Release APK SHA1 Checksum:"
        echo "========================================"
        sha1sum android/app/build/outputs/apk/release/app-release-unsigned.apk
        echo ""
        echo "Release APK MD5 Checksum:"
        md5sum android/app/build/outputs/apk/release/app-release-unsigned.apk
        echo "========================================"
        
    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: android/app/build/outputs/apk/release/app-release-unsigned.apk